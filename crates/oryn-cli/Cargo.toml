[package]
name = "oryn-cli"
version = "0.0.0"
edition = { workspace = true }
license = { workspace = true }

[[bin]]
name = "oryn"
path = "src/main.rs"

[dependencies]
ariadne = "0.6.0"
clap = { version = "4.6.0", features = ["derive"] }
lsp-server = "0.7.9"
lsp-types = "0.97.0"
oryn = { path = "../oryn" }
serde_json = "1.0.149"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
